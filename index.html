<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waevo Hosting — Panel Profesional</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Firebase (solo Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- React + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- React Hot Toast -->
    <script src="https://cdn.jsdelivr.net/npm/react-hot-toast@2.4.1/standalone/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-hot-toast@2.4.1/index.min.css" />

    <style>
        /* ===== ESTILOS GLOBALES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b1120;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .spinner {
            border: 3px solid rgba(59, 130, 246, 0.25);
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 2rem;
            height: 2rem;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
        }
        .badge {
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-js {
            background: #f7df1e;
            color: #000;
        }
        .badge-py {
            background: #3776ab;
            color: #fff;
        }
        .badge-json {
            background: #f5a623;
            color: #000;
        }
        .badge-html {
            background: #e34f26;
            color: #fff;
        }
        .badge-css {
            background: #1572b6;
            color: #fff;
        }
        .badge-md {
            background: #083fa1;
            color: #fff;
        }
        .badge-other {
            background: #475569;
            color: #fff;
        }
        .code-editor {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            tab-size: 2;
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.75rem;
            resize: vertical;
            min-height: 160px;
            width: 100%;
            outline: none;
        }
        .code-editor:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        .progress-bar {
            height: 6px;
            border-radius: 9999px;
            background: #1e293b;
            overflow: hidden;
            margin-top: 0.35rem;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: width 0.6s ease;
        }
        .log-info {
            color: #60a5fa;
        }
        .log-warn {
            color: #fbbf24;
        }
        .log-error {
            color: #f87171;
        }
        .log-success {
            color: #34d399;
        }
        .file-item {
            transition: background 0.15s;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid #1e293b;
            background: #0f172a;
        }
        .file-item:hover {
            background: #1e293b;
        }
        .admin-section {
            border-left: 4px solid #3b82f6;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            border: 1px solid #1e293b;
        }
        .stat-card .icon {
            font-size: 1.5rem;
            color: #3b82f6;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            transition: all 0.2s;
        }
        .btn-danger:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(239, 68, 68, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            transition: all 0.2s;
        }
        .btn-success:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(34, 197, 94, 0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            transition: all 0.2s;
        }
        .btn-warning:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(245, 158, 11, 0.4);
        }
        .setting-group {
            border-bottom: 1px solid #1e293b;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .setting-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        (function() {
            'use strict';

            // =============================================================
            // 1. FIREBASE CONFIG (solo Firestore)
            // =============================================================
            const firebaseConfig = {
                apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
                authDomain: "kahoot-8529e.firebaseapp.com",
                databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
                projectId: "kahoot-8529e",
                storageBucket: "kahoot-8529e.firebasestorage.app",
                messagingSenderId: "313414356056",
                appId: "1:313414356056:web:4aab4587f7df9393008e2d",
                measurementId: "G-8T4CPC1BQ3"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();

            // =============================================================
            // 2. TOAST
            // =============================================================
            const toast = window.toast || {
                success: (msg) => alert('✅ ' + msg),
                error: (msg) => alert('❌ ' + msg),
                custom: (msg) => alert('📢 ' + msg)
            };

            // =============================================================
            // 3. COMPONENTE: LOGIN
            // =============================================================
            function LoginForm({ onLogin }) {
                const [email, setEmail] = React.useState('');
                const [password, setPassword] = React.useState('');
                const [loading, setLoading] = React.useState(false);
                const [error, setError] = React.useState('');

                const handleSubmit = (e) => {
                    e.preventDefault();
                    setLoading(true);
                    setError('');
                    if (email === 'alexsanchezfollia@gmail.com' && password === 'Alex27Junio') {
                        setTimeout(() => {
                            setLoading(false);
                            toast.success('Bienvenido, administrador');
                            onLogin();
                        }, 600);
                    } else {
                        setTimeout(() => {
                            setLoading(false);
                            setError('Credenciales incorrectas');
                            toast.error('Acceso denegado');
                        }, 600);
                    }
                };

                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 p-4">
                        <form onSubmit={handleSubmit} className="bg-gray-800/70 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-700 fade-in">
                            <div className="text-center mb-8">
                                <h1 className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Waevo</h1>
                                <h2 className="text-2xl font-light text-gray-300 mt-1">Hosting</h2>
                                <p className="text-gray-500 text-sm mt-3">Panel de administración</p>
                            </div>
                            {error && <div className="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-xl text-red-200 text-sm">{error}</div>}
                            <input type="email" placeholder="Correo electrónico" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 mb-4 bg-gray-700/70 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                            <input type="password" placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 mb-6 bg-gray-700/70 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required />
                            <button type="submit" disabled={loading} className="w-full btn-primary text-white font-bold py-3 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3">
                                {loading && <span className="spinner" />}
                                {loading ? 'Verificando...' : 'Iniciar sesión'}
                            </button>
                            <p className="text-gray-500 text-xs text-center mt-6">Acceso restringido al administrador</p>
                        </form>
                    </div>
                );
            }

            // =============================================================
            // 4. COMPONENTE: LAYOUT DASHBOARD
            // =============================================================
            function DashboardLayout({ children, currentPage, setPage, onLogout }) {
                const navItems = [
                    { id: 'dashboard', label: 'Panel', icon: 'fa-gauge-high' },
                    { id: 'files', label: 'Archivos', icon: 'fa-folder' },
                    { id: 'console', label: 'Consola', icon: 'fa-terminal' },
                    { id: 'settings', label: 'Ajustes', icon: 'fa-sliders' },
                    { id: 'admin', label: 'Admin', icon: 'fa-user-shield' }
                ];
                return (
                    <div className="min-h-screen bg-gray-900 text-white flex flex-col md:flex-row">
                        <aside className="w-full md:w-64 bg-gray-800/80 backdrop-blur-sm p-4 md:p-6 flex flex-row md:flex-col justify-between items-center md:items-stretch border-b md:border-b-0 md:border-r border-gray-700">
                            <div className="flex items-center gap-3 md:block">
                                <h2 className="text-2xl font-bold text-blue-400">Waevo</h2>
                                <span className="text-xs text-gray-500 hidden md:inline">Hosting</span>
                            </div>
                            <nav className="flex md:flex-col gap-1 md:gap-2 w-full md:w-auto justify-center">
                                {navItems.map((item) => (
                                    <button key={item.id} onClick={() => { setPage(item.id);
                                            window.location.hash = item.id; }} className={`flex items-center gap-3 px-4 py-2 rounded-xl transition ${currentPage === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'hover:bg-gray-700 text-gray-300'}`}>
                                        <i className={`fa-solid ${item.icon}`} />
                                        <span className="hidden md:inline">{item.label}</span>
                                    </button>
                                ))}
                            </nav>
                            <button onClick={onLogout} className="flex items-center gap-2 px-4 py-2 bg-red-600/80 hover:bg-red-700 rounded-xl transition text-sm">
                                <i className="fa-solid fa-right-from-bracket" />
                                <span className="hidden md:inline">Cerrar sesión</span>
                            </button>
                        </aside>
                        <main className="flex-1 p-4 md:p-8 overflow-y-auto max-h-screen">
                            {children}
                        </main>
                    </div>
                );
            }

            // =============================================================
            // 5. COMPONENTE: DASHBOARD HOME
            // =============================================================
            function DashboardHome() {
                const [stats, setStats] = React.useState({ bots: 0, cpu: 0, ram: 0, disk: 0 });
                React.useEffect(() => {
                    // Simular estadísticas
                    setStats({ bots: 3, cpu: 12, ram: 256, disk: 1.2 });
                }, []);
                return (
                    <div className="fade-in">
                        <h1 className="text-3xl font-bold mb-6">Panel de Control</h1>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                            <div className="stat-card flex items-center gap-4">
                                <i className="fa-solid fa-robot icon" />
                                <div><p className="text-gray-400 text-sm">Bots activos</p><p className="text-2xl font-bold">{stats.bots}</p></div>
                            </div>
                            <div className="stat-card flex items-center gap-4">
                                <i className="fa-solid fa-microchip icon" />
                                <div><p className="text-gray-400 text-sm">CPU</p><p className="text-2xl font-bold">{stats.cpu}%</p></div>
                            </div>
                            <div className="stat-card flex items-center gap-4">
                                <i className="fa-solid fa-memory icon" />
                                <div><p className="text-gray-400 text-sm">RAM</p><p className="text-2xl font-bold">{stats.ram} MB</p></div>
                            </div>
                            <div className="stat-card flex items-center gap-4">
                                <i className="fa-solid fa-hard-drive icon" />
                                <div><p className="text-gray-400 text-sm">Disco</p><p className="text-2xl font-bold">{stats.disk} GB</p></div>
                            </div>
                        </div>
                        <div className="glass-card">
                            <p className="text-lg">Bienvenido, <span className="text-blue-400 font-semibold">Administrador</span></p>
                            <p className="text-gray-400 text-sm mt-2">Gestiona tus bots y servidores desde este panel.</p>
                            <button onClick={() => { window.location.hash = 'admin'; }} className="mt-4 btn-primary px-6 py-2 rounded-xl text-white font-bold transition flex items-center gap-2">
                                <i className="fa-solid fa-user-plus" /> Crear nueva cuenta
                            </button>
                        </div>
                    </div>
                );
            }

            // =============================================================
            // 6. COMPONENTE: GESTOR DE ARCHIVOS
            // =============================================================
            function FileManager() {
                const [files, setFiles] = React.useState([]);
                const [newFile, setNewFile] = React.useState({ name: '', content: '', language: 'javascript' });
                const [loading, setLoading] = React.useState(true);
                const [githubUrl, setGithubUrl] = React.useState('');

                React.useEffect(() => {
                    const stored = localStorage.getItem('waevo_files');
                    if (stored) {
                        try { setFiles(JSON.parse(stored)); } catch (e) { setFiles([]); }
                    }
                    setLoading(false);
                }, []);

                const saveFiles = (newFiles) => {
                    setFiles(newFiles);
                    localStorage.setItem('waevo_files', JSON.stringify(newFiles));
                    toast.success('Archivos guardados');
                };

                const addFile = () => {
                    if (!newFile.name.trim()) return toast.error('El nombre es obligatorio');
                    const updated = [...files, { ...newFile }];
                    saveFiles(updated);
                    setNewFile({ name: '', content: '', language: 'javascript' });
                };

                const deleteFile = (index) => {
                    const updated = files.filter((_, i) => i !== index);
                    saveFiles(updated);
                };

                const importFromGithub = async () => {
                    if (!githubUrl.trim()) return toast.error('Introduce una URL raw de GitHub');
                    try {
                        const response = await fetch(githubUrl);
                        if (!response.ok) throw new Error('Error al obtener el archivo');
                        const content = await response.text();
                        const filename = githubUrl.split('/').pop() || 'archivo.txt';
                        const ext = filename.split('.').pop().toLowerCase();
                        const langMap = { js: 'javascript', py: 'python', json: 'json', html: 'html', css: 'css', md: 'markdown' };
                        const language = langMap[ext] || 'other';
                        const updated = [...files, { name: filename, content, language }];
                        saveFiles(updated);
                        setGithubUrl('');
                        toast.success('Archivo importado desde GitHub');
                    } catch (err) {
                        toast.error('Error: ' + err.message);
                    }
                };

                const handleFileUpload = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const content = ev.target.result;
                        const ext = file.name.split('.').pop().toLowerCase();
                        const langMap = { js: 'javascript', py: 'python', json: 'json', html: 'html', css: 'css', md: 'markdown' };
                        const language = langMap[ext] || 'other';
                        const updated = [...files, { name: file.name, content, language }];
                        saveFiles(updated);
                        toast.success('Archivo subido');
                    };
                    reader.readAsText(file);
                    e.target.value = '';
                };

                const getBadgeClass = (lang) => {
                    const map = { javascript: 'badge-js', python: 'badge-py', json: 'badge-json', html: 'badge-html', css: 'badge-css', markdown: 'badge-md' };
                    return map[lang] || 'badge-other';
                };

                if (loading) return ( <div className="flex items-center justify-center h-64"><span className="spinner" /></div> );

                return (
                    <div className="fade-in">
                        <h1 className="text-3xl font-bold mb-6">Gestor de Archivos</h1>
                        <div className="glass-card mb-8">
                            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><i className="fa-solid fa-plus-circle text-blue-400" /> Nuevo archivo</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input type="text" placeholder="Nombre (ej: bot.js)" value={newFile.name} onChange={(e) => setNewFile({ ...newFile, name: e.target.value })} className="bg-gray-700/70 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                <select value={newFile.language} onChange={(e) => setNewFile({ ...newFile, language: e.target.value })} className="bg-gray-700/70 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="javascript">JavaScript</option><option value="python">Python</option><option value="json">JSON</option><option value="html">HTML</option><option value="css">CSS</option><option value="markdown">Markdown</option>
                                </select>
                                <button onClick={addFile} className="btn-primary py-3 rounded-xl font-bold flex items-center justify-center gap-2"><i className="fa-solid fa-plus" /> Crear</button>
                            </div>
                            <textarea placeholder="Contenido del archivo..." value={newFile.content} onChange={(e) => setNewFile({ ...newFile, content: e.target.value })} className="code-editor w-full mt-4" />
                        </div>
                        <div className="glass-card mb-8">
                            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><i className="fa-brands fa-github text-purple-400" /> Importar desde GitHub</h3>
                            <div className="flex flex-col md:flex-row gap-4">
                                <input type="url" placeholder="URL raw (ej: https://raw.githubusercontent.com/.../bot.js)" value={githubUrl} onChange={(e) => setGithubUrl(e.target.value)} className="flex-1 bg-gray-700/70 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                <button onClick={importFromGithub} className="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl font-bold transition flex items-center gap-2"><i className="fa-solid fa-cloud-arrow-down" /> Importar</button>
                            </div>
                        </div>
                        <div className="glass-card mb-8">
                            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><i className="fa-solid fa-upload text-green-400" /> Subir archivo local</h3>
                            <input type="file" onChange={handleFileUpload} className="block w-full text-sm text-gray-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer" />
                        </div>
                        <div>
                            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><i className="fa-regular fa-folder-open" /> Archivos ({files.length})</h3>
                            {files.length === 0 ? <p className="text-gray-500">No hay archivos aún.</p> :
                                <div className="space-y-2">
                                    {files.map((file, idx) => (
                                        <div key={idx} className="file-item flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                                            <div className="flex items-center gap-3 flex-wrap">
                                                <i className="fa-regular fa-file text-gray-400" />
                                                <span className="font-mono">{file.name}</span>
                                                <span className={`badge ${getBadgeClass(file.language)}`}>{file.language || 'otros'}</span>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => alert('Contenido de ' + file.name + ':\n\n' + file.content)} className="text-gray-400 hover:text-white transition"><i className="fa-regular fa-eye" /></button>
                                                <button onClick={() => deleteFile(idx)} className="text-red-400 hover:text-red-600 transition"><i className="fa-regular fa-trash-can" /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            }
                        </div>
                    </div>
                );
            }

            // =============================================================
            // 7. COMPONENTE: CONSOLA (desactivada)
            // =============================================================
            function ConsoleStats() {
                const [isConnected, setIsConnected] = React.useState(false);
                const [isLoading, setIsLoading] = React.useState(false);
                const [logs, setLogs] = React.useState([
                    { level: 'info', message: 'Servicio de consola desactivado' },
                    { level: 'info', message: 'Conecta con Pterodactyl para logs reales' }
                ]);
                const [logInput, setLogInput] = React.useState('');

                const handleConnect = async () => {
                    setIsLoading(true);
                    try {
                        await new Promise((resolve) => setTimeout(resolve, 1500));
                        throw new Error('El servicio de consola no está disponible. Configura la API de Pterodactyl.');
                    } catch (error) {
                        toast.error(error.message || 'No se pudo conectar');
                        setLogs(prev => [...prev, { level: 'error', message: error.message || 'Fallo de conexión' }]);
                        setIsConnected(false);
                    } finally { setIsLoading(false); }
                };

                const handleDisconnect = () => {
                    setIsConnected(false);
                    setLogs([{ level: 'info', message: 'Servicio de consola desactivado' }, { level: 'info', message: 'Conecta con Pterodactyl para logs reales' }]);
                    toast.success('Consola desconectada');
                };

                const sendTestLog = () => {
                    if (!logInput.trim()) return;
                    const level = logInput.startsWith('[ERROR]') ? 'error' : logInput.startsWith('[WARN]') ? 'warn' : logInput.startsWith('[SUCCESS]') ? 'success' : 'info';
                    setLogs(prev => [...prev, { level, message: logInput }]);
                    setLogInput('');
                };

                const getLogClass = (level) => {
                    switch (level) { case 'info':
                            return 'log-info'; case 'warn':
                            return 'log-warn'; case 'error':
                            return 'log-error'; case 'success':
                            return 'log-success'; default:
                            return ''; }
                };

                return (
                    <div className="fade-in">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                            <h1 className="text-3xl font-bold">Consola</h1>
                            <div className="flex gap-3">
                                {!isConnected ? (
                                    <button onClick={handleConnect} disabled={isLoading} className="btn-success px-6 py-2 rounded-xl font-bold transition disabled:opacity-50 flex items-center gap-3">
                                        {isLoading && <span className="spinner" />}
                                        {isLoading ? 'Conectando...' : <><i className="fa-solid fa-plug" /> Activar</>}
                                    </button>
                                ) : (
                                    <button onClick={handleDisconnect} className="btn-danger px-6 py-2 rounded-xl font-bold transition flex items-center gap-3">
                                        <i className="fa-solid fa-power-off" /> Desactivar
                                    </button>
                                )}
                            </div>
                        </div>
                        <div className={`mb-6 p-3 rounded-xl text-center font-bold ${isConnected ? 'bg-green-800/60 text-green-200' : 'bg-yellow-800/60 text-yellow-200'}`}>
                            {isConnected ? '✅ Consola activa' : '⛔ Consola desactivada'}
                        </div>
                        <div className="bg-black/60 p-4 rounded-2xl border border-gray-700">
                            <h3 className="text-lg font-semibold mb-3 flex items-center gap-2"><i className="fa-solid fa-list-ul" /> Logs</h3>
                            <div className="h-64 overflow-y-auto font-mono text-sm space-y-1">
                                {logs.map((log, i) => <div key={i} className={`border-b border-gray-800/60 py-1 ${getLogClass(log.level)}`}>[{log.level.toUpperCase()}] {log.message}</div>)}
                            </div>
                            {!isConnected && (
                                <div className="mt-4 flex gap-3">
                                    <input type="text" placeholder="Escribe un log de prueba (ej: [ERROR] Algo falló)" value={logInput} onChange={(e) => setLogInput(e.target.value)} className="flex-1 bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    <button onClick={sendTestLog} className="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-xl transition">Enviar</button>
                                </div>
                            )}
                        </div>
                        <p className="text-gray-500 text-sm mt-4">* La consola real requiere conexión con Pterodactyl. Actualmente desactivada.</p>
                    </div>
                );
            }

            // =============================================================
            // 8. COMPONENTE: AJUSTES (MUCHOS MÁS)
            // =============================================================
            function Settings() {
                const [settings, setSettings] = React.useState({
                    botName: '',
                    port: '3000',
                    startup: '',
                    packages: '',
                    envVars: '',
                    nodeVersion: '18',
                    pythonVersion: '3.10',
                    memoryLimit: '512',
                    cpuLimit: '100',
                    diskLimit: '10',
                    autoRestart: true,
                    backupEnabled: false,
                    logLevel: 'info',
                    timezone: 'Europe/Madrid'
                });
                const [loading, setLoading] = React.useState(true);

                React.useEffect(() => {
                    const stored = localStorage.getItem('waevo_settings');
                    if (stored) {
                        try {
                            const data = JSON.parse(stored);
                            setSettings(prev => ({ ...prev, ...data }));
                        } catch (e) {}
                    }
                    setLoading(false);
                }, []);

                const saveSettings = () => {
                    localStorage.setItem('waevo_settings', JSON.stringify(settings));
                    toast.success('Todos los ajustes guardados');
                };

                const update = (key, value) => {
                    setSettings(prev => ({ ...prev, [key]: value }));
                };

                if (loading) return ( <div className="flex items-center justify-center h-64"><span className="spinner" /></div> );

                return (
                    <div className="fade-in">
                        <h1 className="text-3xl font-bold mb-6">Ajustes Avanzados</h1>
                        <div className="glass-card space-y-6">
                            {/* Sección: General */}
                            <div className="setting-group">
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2"><i className="fa-solid fa-gear text-blue-400" /> General</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Nombre del bot</label>
                                        <input type="text" value={settings.botName} onChange={(e) => update('botName', e.target.value)} placeholder="MiBot" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Puerto</label>
                                        <input type="text" value={settings.port} onChange={(e) => update('port', e.target.value)} placeholder="3000" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Zona horaria</label>
                                        <select value={settings.timezone} onChange={(e) => update('timezone', e.target.value)} className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                                            <option value="Europe/Madrid">Madrid</option>
                                            <option value="America/Mexico_City">Ciudad de México</option>
                                            <option value="America/Argentina/Buenos_Aires">Buenos Aires</option>
                                            <option value="UTC">UTC</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Nivel de logs</label>
                                        <select value={settings.logLevel} onChange={(e) => update('logLevel', e.target.value)} className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                                            <option value="debug">Debug</option>
                                            <option value="info">Info</option>
                                            <option value="warn">Warn</option>
                                            <option value="error">Error</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* Sección: Versiones y límites */}
                            <div className="setting-group">
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2"><i className="fa-solid fa-microchip text-purple-400" /> Versiones y límites</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Node.js</label>
                                        <input type="text" value={settings.nodeVersion} onChange={(e) => update('nodeVersion', e.target.value)} placeholder="18" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Python</label>
                                        <input type="text" value={settings.pythonVersion} onChange={(e) => update('pythonVersion', e.target.value)} placeholder="3.10" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Límite de RAM (MB)</label>
                                        <input type="number" value={settings.memoryLimit} onChange={(e) => update('memoryLimit', e.target.value)} placeholder="512" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Límite de CPU (%)</label>
                                        <input type="number" value={settings.cpuLimit} onChange={(e) => update('cpuLimit', e.target.value)} placeholder="100" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Límite de disco (GB)</label>
                                        <input type="number" value={settings.diskLimit} onChange={(e) => update('diskLimit', e.target.value)} placeholder="10" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                </div>
                            </div>

                            {/* Sección: Startup y paquetes */}
                            <div className="setting-group">
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2"><i className="fa-solid fa-play text-green-400" /> Ejecución</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Comando de inicio</label>
                                        <input type="text" value={settings.startup} onChange={(e) => update('startup', e.target.value)} placeholder="node bot.js" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Paquetes adicionales</label>
                                        <input type="text" value={settings.packages} onChange={(e) => update('packages', e.target.value)} placeholder="express dotenv" className="w-full bg-gray-700/70 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-1">Variables de entorno</label>
                                        <textarea value={settings.envVars} onChange={(e) => update('envVars', e.target.value)} placeholder="CLAVE=valor" className="code-editor w-full" rows="3" />
                                    </div>
                                </div>
                            </div>

                            {/* Sección: Comportamiento */}
                            <div className="setting-group">
                                <h3 className="text-lg font-semibold mb-3 flex items-center gap-2"><i className="fa-solid fa-toggle-on text-yellow-400" /> Comportamiento</h3>
                                <div className="flex flex-wrap gap-6">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={settings.autoRestart} onChange={(e) => update('autoRestart', e.target.checked)} className="w-5 h-5 accent-blue-500" />
                                        <span>Reinicio automático</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={settings.backupEnabled} onChange={(e) => update('backupEnabled', e.target.checked)} className="w-5 h-5 accent-blue-500" />
                                        <span>Backups habilitados</span>
                                    </label>
                                </div>
                            </div>

                            <button onClick={saveSettings} className="btn-primary px-8 py-3 rounded-xl font-bold transition flex items-center gap-3 w-full justify-center">
                                <i className="fa-solid fa-floppy-disk" /> Guardar todos los cambios
                            </button>
                        </div>
                    </div>
                );
            }

            // =============================================================
            // 9. COMPONENTE: ADMIN (CREACIÓN POR CÓDIGO JS)
            // =============================================================
            function AdminPanel() {
                const [code, setCode] = React.useState('');
                const [executing, setExecuting] = React.useState(false);
                const [accounts, setAccounts] = React.useState([]);
                const [loadingAccounts, setLoadingAccounts] = React.useState(true);

                // Cargar cuentas
                React.useEffect(() => {
                    const fetchAccounts = async () => {
                        try {
                            const snapshot = await db.collection('users').get();
                            const list = [];
                            snapshot.forEach(doc => {
                                list.push({ id: doc.id, ...doc.data() });
                            });
                            setAccounts(list);
                        } catch (err) {
                            toast.error('Error al cargar cuentas');
                        } finally {
                            setLoadingAccounts(false);
                        }
                    };
                    fetchAccounts();
                }, []);

                // Código de ejemplo precargado (crea cuenta Prueba1)
                const loadExampleCode = () => {
                    const example = `// Código para crear una cuenta de usuario
        // Modifica los valores y ejecuta
        const accountData = {
          email: "Prueba1@gmail.com",
          password: "331", // En producción, usar hash
          serverType: "node", // "node" o "python"
          version: "18",
          settings: {
            botName: "MiBot",
            port: "3000",
            startup: "node bot.js",
            packages: "express dotenv",
            envVars: "TOKEN=123\\nCLIENT_ID=456"
          }
        };

        // La función createAccount está disponible en el contexto
        createAccount(accountData);`;
                    setCode(example);
                };

                // Función que se expondrá al evaluar el código
                const createAccount = async (data) => {
                    if (!data.email || !data.password) {
                        toast.error('Email y contraseña son obligatorios');
                        return;
                    }
                    try {
                        const docRef = await db.collection('users').add({
                            email: data.email,
                            password: data.password,
                            serverType: data.serverType || 'node',
                            version: data.version || '18',
                            createdAt: new Date().toISOString(),
                            files: [],
                            settings: data.settings || {
                                botName: '',
                                port: '3000',
                                startup: '',
                                packages: '',
                                envVars: ''
                            }
                        });
                        toast.success(`Cuenta ${data.email} creada con éxito`);
                        // Recargar lista
                        const snapshot = await db.collection('users').get();
                        const list = [];
                        snapshot.forEach(doc => {
                            list.push({ id: doc.id, ...doc.data() });
                        });
                        setAccounts(list);
                        return { success: true, id: docRef.id };
                    } catch (error) {
                        toast.error('Error al crear: ' + error.message);
                        return { success: false, error: error.message };
                    }
                };

                const executeCode = async () => {
                    setExecuting(true);
                    try {
                        // Crear un contexto con la función createAccount
                        const context = { createAccount };
                        // Evaluar el código en ese contexto
                        const func = new Function('context', `
                            with (context) {
                                ${code}
                            }
                        `);
                        func(context);
                        toast.success('Código ejecutado correctamente');
                    } catch (err) {
                        toast.error('Error en el código: ' + err.message);
                    } finally {
                        setExecuting(false);
                    }
                };

                const deleteAccount = async (id) => {
                    if (!confirm('¿Eliminar esta cuenta?')) return;
                    try {
                        await db.collection('users').doc(id).delete();
                        toast.success('Cuenta eliminada');
                        setAccounts(accounts.filter(a => a.id !== id));
                    } catch (err) {
                        toast.error('Error al eliminar');
                    }
                };

                if (loadingAccounts) return ( <div className="flex items-center justify-center h-64"><span className="spinner" /></div> );

                return (
                    <div className="fade-in">
                        <h1 className="text-3xl font-bold mb-6">Administración por Código</h1>

                        <div className="glass-card mb-8 admin-section">
                            <h2 className="text-2xl font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-code text-blue-400" /> Crear cuenta mediante código JS</h2>
                            <p className="text-gray-400 text-sm mb-4">
                                Escribe un código JavaScript que utilice la función <code className="bg-gray-700 px-1 rounded">createAccount(objeto)</code>.
                                El objeto debe tener <strong>email</strong>, <strong>password</strong>, <strong>serverType</strong> (node/python), <strong>version</strong> y opcionalmente <strong>settings</strong>.
                            </p>
                            <div className="flex gap-3 mb-4">
                                <button onClick={loadExampleCode} className="btn-warning px-4 py-2 rounded-xl font-bold transition flex items-center gap-2">
                                    <i className="fa-solid fa-file-code" /> Cargar ejemplo (Prueba1)
                                </button>
                                <button onClick={() => setCode('')} className="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-xl font-bold transition">
                                    Limpiar
                                </button>
                            </div>
                            <textarea
                                value={code}
                                onChange={(e) => setCode(e.target.value)}
                                className="code-editor w-full"
                                rows="12"
                                placeholder="// Escribe aquí tu código JS..."
                                spellCheck="false"
                            />
                            <button
                                onClick={executeCode}
                                disabled={executing}
                                className="mt-4 btn-success px-8 py-3 rounded-xl font-bold transition disabled:opacity-50 flex items-center gap-3"
                            >
                                {executing && <span className="spinner" />}
                                {executing ? 'Ejecutando...' : <><i className="fa-solid fa-play" /> Ejecutar código</>}
                            </button>
                        </div>

                        <div className="glass-card">
                            <h3 className="text-xl font-semibold mb-4 flex items-center gap-2"><i className="fa-regular fa-users" /> Cuentas existentes ({accounts.length})</h3>
                            {accounts.length === 0 ? <p className="text-gray-500">No hay cuentas creadas.</p> :
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-gray-400 border-b border-gray-700">
                                            <tr><th className="pb-2 pr-4">Correo</th><th className="pb-2 pr-4">Tipo</th><th className="pb-2 pr-4">Versión</th><th className="pb-2">Acciones</th></tr>
                                        </thead>
                                        <tbody>
                                            {accounts.map((acc) => (
                                                <tr key={acc.id} className="border-b border-gray-800/60">
                                                    <td className="py-3 pr-4 font-mono">{acc.email}</td>
                                                    <td className="py-3 pr-4">{acc.serverType === 'node' ? 'Node.js' : 'Python'}</td>
                                                    <td className="py-3 pr-4">{acc.version}</td>
                                                    <td className="py-3">
                                                        <button onClick={() => deleteAccount(acc.id)} className="text-red-400 hover:text-red-600 transition"><i className="fa-regular fa-trash-can" /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            }
                        </div>
                    </div>
                );
            }

            // =============================================================
            // 10. APLICACIÓN PRINCIPAL
            // =============================================================
            function App() {
                const [isLoggedIn, setIsLoggedIn] = React.useState(false);
                const [page, setPage] = React.useState('dashboard');

                React.useEffect(() => {
                    const handleHash = () => {
                        const hash = window.location.hash.replace('#', '');
                        if (['dashboard', 'files', 'console', 'settings', 'admin'].includes(hash)) {
                            setPage(hash);
                        } else {
                            setPage('dashboard');
                        }
                    };
                    window.addEventListener('hashchange', handleHash);
                    handleHash();
                    return () => window.removeEventListener('hashchange', handleHash);
                }, []);

                const handleLogin = () => { setIsLoggedIn(true);
                    window.location.hash = 'dashboard'; };
                const handleLogout = () => { setIsLoggedIn(false);
                    window.location.hash = '';
                    toast.success('Sesión cerrada'); };

                if (!isLoggedIn) return <LoginForm onLogin={handleLogin} />;

                let content;
                switch (page) {
                    case 'dashboard':
                        content = <DashboardHome />;
                        break;
                    case 'files':
                        content = <FileManager />;
                        break;
                    case 'console':
                        content = <ConsoleStats />;
                        break;
                    case 'settings':
                        content = <Settings />;
                        break;
                    case 'admin':
                        content = <AdminPanel />;
                        break;
                    default:
                        content = <DashboardHome />;
                }

                return (
                    <DashboardLayout currentPage={page} setPage={setPage} onLogout={handleLogout}>
                        {content}
                    </DashboardLayout>
                );
            }

            // =============================================================
            // 11. RENDER
            // =============================================================
            const rootElement = document.getElementById('root');
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);

        })();
    </script>

</body>
</html>
